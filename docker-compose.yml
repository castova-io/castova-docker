services:
  panel:
    image: ghcr.io/castova-io/panel:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - MQTT_URL=${MQTT_URL}
      - JWT_SECRET=${JWT_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - STORAGE_ENCRYPTION_KEY=${STORAGE_ENCRYPTION_KEY}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - LIVEKIT_URL=${LIVEKIT_URL}
      - LIVEKIT_INTERNAL_URL=ws://livekit:7880
      - BRIDGE_URL=http://studio-bridge:8091
      - BRIDGE_SECRET=${BRIDGE_SECRET}
      - TURN_HOST=${PANEL_DOMAIN}
      - TURN_PORT=3478
      - TURN_SECRET=${TURN_SECRET}
      - PANEL_PUBLIC_URL=https://${PANEL_DOMAIN}
      - KEYGEN_ACCOUNT_ID=${KEYGEN_ACCOUNT_ID:-}
      - KEYGEN_PRODUCT_TOKEN=${KEYGEN_PRODUCT_TOKEN:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - SUPPORT_API_URL=https://support.castova.net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mosquitto:
        condition: service_started

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command: --config /etc/livekit/livekit.yaml
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7881:7881/udp"
      - "50200-50300:50200-50300/udp"
    depends_on:
      - redis

  studio-bridge:
    image: ghcr.io/castova-io/studio-bridge:latest
    restart: unless-stopped
    environment:
      - LIVEKIT_INTERNAL_URL=ws://livekit:7880
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - BRIDGE_SECRET=${BRIDGE_SECRET}
      - PANEL_URL=http://panel:3000
      - BRIDGE_PORT=8090
    depends_on:
      - livekit
      - panel

  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf
    command: -c /etc/coturn/turnserver.conf

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: castova
      POSTGRES_USER: castova
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U castova"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - panel

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  caddy_data:
  caddy_config:
